services:
  private-github-link:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: private-github-link
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      SELF_HOSTED: "true"
      # Optional only:
      # SENTRY_DSN: ""
      # VITE_SENTRY_DSN: ""
      # VITE_POSTHOG_KEY: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s